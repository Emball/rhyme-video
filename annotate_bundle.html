<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyme Annotator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Anton&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
  --text:#e8e8e8;--dim:#666;--muted:#3a3a3a;
  --font-ui:'Space Grotesk',sans-serif;
  --gray-bg:#8a8a8a;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto}
button{font-family:var(--font-ui);font-size:12px;font-weight:500;padding:5px 11px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:background .1s}
button:hover{background:#2a2a2a;border-color:#444}
button.primary{background:#e8e8e8;color:#111;border-color:#e8e8e8}
button.primary:hover{background:#fff}
button.danger{color:#e06060;border-color:#5a2020}
button.danger:hover{background:#2a1515}
button:disabled{opacity:.4;cursor:default}
select,input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:12px;padding:5px 9px;border-radius:4px;outline:none}

/* Layout */
.workspace{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.new-song-form{padding:8px 14px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.new-song-form input{font-size:12px;width:100%}
.song-list{flex:1;overflow-y:auto;padding:4px 0}
.song-item{padding:7px 14px;font-size:12px;cursor:pointer;border-left:2px solid transparent;color:var(--dim);transition:all .1s}
.song-item:hover{background:var(--surface2);color:var(--text)}
.song-item.active{border-left-color:#e8e8e8;color:var(--text);background:var(--surface2)}
.song-item .st{font-weight:500}
.song-item .sm{font-size:10px;color:var(--muted);margin-top:1px}

/* Editor */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.toolbar-song{font-size:13px;font-weight:500}
.hint{font-size:11px;color:var(--dim)}
kbd{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:10px;font-family:monospace;color:var(--dim)}

/* Canvas: Genius-style preview */
.canvas-wrap{flex:1;overflow-y:auto;background:#111;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
.genius-canvas{
  width:100%;max-width:860px;
  background:linear-gradient(160deg,#919191 0%,#7a7a7a 100%);
  border-radius:4px;
  padding:48px 56px 64px;
  min-height:400px;
  position:relative;
}
.genius-canvas .song-title-display{
  font-family:'Anton',sans-serif;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.4);
  margin-bottom:28px;
}

/* Lyric lines */
.lyric-line{
  font-family:'Anton',sans-serif;
  font-size:26px;
  line-height:1;
  margin-bottom:6px;
  color:#111;
  display:flex;
  flex-wrap:wrap;
  align-items:baseline;
  gap:0;
  min-height:40px;
}
.lyric-line.spacer{height:16px;min-height:16px}

/* Word wrapper — hover target */
.word-wrap{
  display:inline-flex;
  align-items:baseline;
  position:relative;
  margin-right:8px;
  cursor:default;
  border-radius:4px;
  padding:2px 1px;
  transition:background .1s;
}
.word-wrap:hover .syl-skeleton{opacity:1}
.word-wrap:hover{background:rgba(0,0,0,0.06)}

/* Syllable spans */
.syl{
  display:inline;
  border-radius:3px;
  padding:3px 2px;
  cursor:pointer;
  position:relative;
  transition:filter .1s;
  color:#111;
  line-height:1;
}
.syl:hover{filter:brightness(.92)}
.syl.has-color{}

/* Skeleton dividers shown on word hover */
.syl-skeleton{
  position:absolute;
  top:0;bottom:0;
  width:1px;
  background:rgba(0,0,0,0.25);
  pointer-events:none;
  opacity:0;
  transition:opacity .1s;
}

/* Inline color picker */
.color-popup{
  position:fixed;
  z-index:9999;
  background:#1a1a1a;
  border:1px solid #3a3a3a;
  border-radius:8px;
  padding:10px;
  display:none;
  flex-wrap:wrap;
  gap:6px;
  width:188px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
.color-popup.open{display:flex}
.cp-swatch{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .1s,border-color .1s;
  flex-shrink:0;
}
.cp-swatch:hover{transform:scale(1.2)}
.cp-swatch.active{border-color:white}
.cp-clear{
  width:100%;font-size:11px;padding:4px;margin-top:2px;
  color:#e06060;border-color:#5a2020;text-align:center;
}

/* Input area (before lyrics set) */
.lyrics-input-wrap{padding:32px 40px}
.lyrics-input-wrap textarea{
  width:100%;max-width:700px;height:280px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:monospace;font-size:14px;
  line-height:1.8;padding:14px;border-radius:6px;resize:vertical;outline:none;
  display:block;margin-bottom:10px;
}

/* Status */
.statusbar{display:flex;align-items:center;gap:16px;padding:5px 16px;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--dim);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:#333}
.dot.on{background:#4caf7d}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;width:460px;max-width:90vw}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px}
.modal textarea{width:100%;height:200px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:monospace;font-size:13px;line-height:1.7;padding:12px;border-radius:4px;resize:vertical;outline:none;margin-bottom:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.empty{color:#444;font-size:14px;padding:40px;font-style:italic}
</style>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Edit Lyrics</h3>
    <textarea id="modal-ta"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="commitFromModal()">Update</button>
    </div>
  </div>
</div>

<script>
// ── Palette ──
const PALETTE = [
  '#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF',
  '#D7BAFF','#FFB3F0','#B3FFF0','#FFC8A2','#C9FFB3',
  '#A2D4FF','#FFD6A5','#CAFFBF','#9BF6FF','#BDB2FF',
  '#FFC6FF','#FDFFB6','#A8DADC','#F4A261','#90E0EF',
];

// ── State ──
let songs = JSON.parse(localStorage.getItem('rha_songs')||'[]');
let activeId = null;
let alignData = null;
let syllDict = null;
let openPopup = null; // currently open color popup element

// ── Load syllable dictionary ──
if(window.SYLDICT){
  syllDict=window.SYLDICT;
  console.log(`Syllable dict (inline): ${Object.keys(syllDict).length} entries`);
} else {
  fetch('syllable_dict.json')
    .then(r=>r.json())
    .then(d=>{syllDict=d;console.log(`Syllable dict: ${Object.keys(d).length} entries`)})
    .catch(()=>console.warn('syllable_dict.json not found, using fallback'));
}

function splitSyllables(word) {
  const clean = word.toLowerCase().replace(/[^a-z]/g,'');
  if (syllDict && syllDict[clean]) {
    const positions = syllDict[clean];
    const syls = [];
    let prev = 0;
    for (const p of positions) { syls.push(word.slice(prev, p)); prev = p; }
    syls.push(word.slice(prev));
    return syls.filter(s => s.length > 0);
  }
  return [word];
}

// ── Persistence ──
function save(){localStorage.setItem('rha_songs',JSON.stringify(songs))}
function getSong(){return songs.find(s=>s.id===activeId)||null}
function countSpans(song){return (song.tokens||[]).reduce((a,t)=>a+(t.syls||[]).reduce((b,s)=>b+(s.color?1:0),0),0)}

// ── Song manager ──
function addSong(){
  const inp=document.getElementById('new-title');
  const title=inp.value.trim(); if(!title)return;
  const song={id:Date.now()+'',title,lyrics:'',tokens:[]};
  songs.push(song); save(); inp.value='';
  renderSongList(); selectSong(song.id);
}

function renderSongList(){
  const el=document.getElementById('song-list');
  if(!songs.length){el.innerHTML='<div class="song-item" style="cursor:default;color:#333;font-size:11px;padding:8px 14px">No songs yet</div>';return}
  el.innerHTML=songs.map(s=>`
    <div class="song-item${s.id===activeId?' active':''}" onclick="selectSong('${s.id}')">
      <div class="st">${s.title}</div>
      <div class="sm">${countSpans(s)} spans</div>
    </div>`).join('');
}

function selectSong(id){
  activeId=id; renderSongList(); loadEditor();
}

// ── Editor ──
function loadEditor(){
  const song=getSong(); if(!song)return;
  document.getElementById('toolbar-song').textContent=song.title;
  document.getElementById('btn-edit').disabled=false;
  document.getElementById('btn-clear').disabled=false;
  document.getElementById('empty-msg').style.display='none';
  if(!song.lyrics){
    document.getElementById('input-wrap').style.display='block';
    document.getElementById('genius-canvas').style.display='none';
    document.getElementById('lyrics-ta').value='';
  } else {
    document.getElementById('input-wrap').style.display='none';
    showCanvas(song);
  }
  updateStatus();
}

function commitLyrics(){
  const song=getSong(); if(!song)return;
  const text=document.getElementById('lyrics-ta').value.trim(); if(!text)return;
  setLyrics(song,text); save();
  document.getElementById('input-wrap').style.display='none';
  showCanvas(song); updateStatus();
}

function openModal(){
  const song=getSong(); if(!song)return;
  document.getElementById('modal-ta').value=song.lyrics;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function commitFromModal(){
  const song=getSong(); if(!song)return;
  const text=document.getElementById('modal-ta').value.trim(); if(!text)return;
  setLyrics(song,text); save(); closeModal();
  document.getElementById('input-wrap').style.display='none';
  showCanvas(song); updateStatus();
}

function setLyrics(song,text){
  song.lyrics=text;
  // Rebuild tokens preserving existing color data where word text matches
  const oldMap={};
  (song.tokens||[]).forEach(t=>{
    const key=`${t.lineIdx}:${t.wordIdx}`;
    oldMap[key]=t;
  });
  song.tokens=buildTokens(text,oldMap);
}

// ── Token builder ──
function buildTokens(text,oldMap={}){
  const lines=text.split('\n');
  const tokens=[];
  lines.forEach((line,li)=>{
    if(!line.trim()){tokens.push({lineIdx:li,wordIdx:0,text:'',blank:true,syls:[]});return}
    const words=line.match(/\S+/g)||[];
    words.forEach((word,wi)=>{
      const key=`${li}:${wi}`;
      const old=oldMap[key];
      const rawSyls=splitSyllables(word);
      // Try to restore colors if same word
      let syls;
      if(old && old.text===word && old.syls && old.syls.length===rawSyls.length){
        syls=old.syls;
      } else {
        syls=rawSyls.map(s=>({text:s,color:null}));
      }
      tokens.push({lineIdx:li,wordIdx:wi,text:word,blank:false,syls});
    });
  });
  return tokens;
}

// ── Render canvas ──
function showCanvas(song){
  const gc=document.getElementById('genius-canvas');
  gc.style.display='block';
  document.getElementById('canvas-title').textContent=song.title;
  renderLines(song);
}

function renderLines(song){
  const container=document.getElementById('lines-container');
  container.innerHTML='';
  // Group by line
  const byLine={};
  song.tokens.forEach(t=>{
    if(!byLine[t.lineIdx])byLine[t.lineIdx]=[];
    byLine[t.lineIdx].push(t);
  });
  Object.keys(byLine).sort((a,b)=>a-b).forEach(li=>{
    const lineTokens=byLine[li];
    const lineEl=document.createElement('div');
    if(lineTokens.length===1&&lineTokens[0].blank){
      lineEl.className='lyric-line spacer';
    } else {
      lineEl.className='lyric-line';
      lineTokens.forEach(token=>{
        if(token.blank)return;
        lineEl.appendChild(buildWordEl(token,song));
      });
    }
    container.appendChild(lineEl);
  });
}

function buildWordEl(token,song){
  const wrap=document.createElement('span');
  wrap.className='word-wrap';
  wrap.dataset.li=token.lineIdx;
  wrap.dataset.wi=token.wordIdx;

  token.syls.forEach((syl,si)=>{
    const sp=document.createElement('span');
    sp.className='syl'+(syl.color?' has-color':'');
    sp.dataset.li=token.lineIdx;
    sp.dataset.wi=token.wordIdx;
    sp.dataset.si=si;
    sp.textContent=syl.text;
    if(syl.color)sp.style.background=syl.color;

    sp.addEventListener('click',e=>{
      e.stopPropagation();
      openColorPopup(sp,token,si,song);
    });
    wrap.appendChild(sp);
  });

  // Skeleton dividers between syllables
  if(token.syls.length>1){
    // We'll add them via layout — position absolute between syls
    // Done via CSS on word-wrap hover; actual dividers added after paint
    requestAnimationFrame(()=>addSkeletonDividers(wrap,token));
  }

  return wrap;
}

function addSkeletonDividers(wrap,token){
  const syls=wrap.querySelectorAll('.syl');
  if(syls.length<2)return;
  syls.forEach((sp,i)=>{
    if(i===syls.length-1)return;
    const div=document.createElement('span');
    div.className='syl-skeleton';
    // position right edge of this syllable span
    const rect=sp.getBoundingClientRect();
    const wrapRect=wrap.getBoundingClientRect();
    div.style.left=(rect.right-wrapRect.left)+'px';
    wrap.appendChild(div);
  });
}

// ── Color popup ──
function openColorPopup(sylEl,token,si,song){
  closePopup();

  const popup=document.createElement('div');
  popup.className='color-popup open';

  PALETTE.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='cp-swatch'+(token.syls[si].color===c?' active':'');
    sw.style.background=c;
    sw.title=c;
    sw.addEventListener('click',e=>{
      e.stopPropagation();
      token.syls[si].color=c;
      save(); closePopup();
      refreshWord(sylEl.closest('.word-wrap'),token,song);
      updateStatus(); renderSongList();
    });
    popup.appendChild(sw);
  });

  // Clear button
  const clr=document.createElement('button');
  clr.className='cp-clear';
  clr.textContent='Remove color';
  clr.addEventListener('click',e=>{
    e.stopPropagation();
    token.syls[si].color=null;
    save(); closePopup();
    refreshWord(sylEl.closest('.word-wrap'),token,song);
    updateStatus(); renderSongList();
  });
  popup.appendChild(clr);

  // Attach to body, position below syllable span
  document.body.appendChild(popup);
  const r=sylEl.getBoundingClientRect();
  let top=r.bottom+6, left=r.left;
  if(left+188>window.innerWidth) left=window.innerWidth-196;
  if(top+200>window.innerHeight) top=r.top-206;
  popup.style.top=top+'px';
  popup.style.left=left+'px';
  openPopup=popup;

  // Close on outside click
  setTimeout(()=>{
    document.addEventListener('click',closePopup,{once:true});
  },0);
}

function closePopup(){
  if(openPopup){openPopup.remove();openPopup=null;}
}

// Manual text selection → color picker for unknown/single-syl words
document.getElementById('lines-container').addEventListener('mouseup', e => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const text = sel.toString().trim();
  if (!text) return;
  // Find which syl span the selection anchor is in
  const anchor = sel.anchorNode?.parentElement?.closest('.syl');
  if (!anchor) { sel.removeAllRanges(); return; }
  // Only trigger on single-syl words (whole word is one span)
  const wrap = anchor.closest('.word-wrap');
  if (!wrap || wrap.querySelectorAll('.syl').length > 1) { sel.removeAllRanges(); return; }
  const song = getSong(); if (!song) return;
  const li = parseInt(wrap.dataset.li), wi = parseInt(wrap.dataset.wi);
  const token = song.tokens.find(t => t.lineIdx===li && t.wordIdx===wi);
  if (!token) return;
  sel.removeAllRanges();
  openColorPopup(anchor, token, 0, song);
});

function refreshWord(wrapEl,token,song){
  if(!wrapEl)return;
  const newEl=buildWordEl(token,song);
  wrapEl.replaceWith(newEl);
  requestAnimationFrame(()=>addSkeletonDividers(newEl,token));
}

// ── Controls ──
function clearAll(){
  const song=getSong(); if(!song)return;
  if(!confirm('Clear all highlights?'))return;
  song.tokens.forEach(t=>t.syls.forEach(s=>s.color=null));
  save(); renderLines(song); updateStatus(); renderSongList();
}

// ── Alignment ──
function importAlignment(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        alignData=JSON.parse(ev.target.result);
        document.getElementById('align-dot').classList.add('on');
        document.getElementById('align-status').textContent=`Alignment: ${alignData.words?.length||0} words`;
      }catch{alert('Invalid alignment.json')}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ── Export ──
function exportAnnotation(){
  const song=getSong(); if(!song){alert('No song selected');return}
  const spans=[];
  let wi=0;
  song.tokens.forEach(token=>{
    if(token.blank)return;
    token.syls.forEach((syl,si)=>{
      if(syl.color){
        // compute char offsets within word
        const charStart=token.syls.slice(0,si).reduce((a,s)=>a+s.text.length,0);
        const charEnd=charStart+syl.text.length;
        spans.push({word_index:wi,word_text:token.text,syl_index:si,syl_text:syl.text,char_start:charStart,char_end:charEnd,color:syl.color});
      }
    });
    wi++;
  });
  const out={song:song.title,exported_at:new Date().toISOString(),spans};
  if(alignData)out.alignment_ref=true;
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${song.title.replace(/\s+/g,'_')}_annotation.json`;
  a.click();
}

// ── Status ──
function updateStatus(){
  const song=getSong();
  const n=song?countSpans(song):0;
  document.getElementById('span-count').textContent=`${n} span${n!==1?'s':''} annotated`;
}

// ── Init ──
renderSongList();
</script>
</body>
</html>
